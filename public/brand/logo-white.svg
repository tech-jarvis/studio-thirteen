  >STUDIO</text>

  <!-- XIII text in red -->
  <text
    x="540"
    y="660"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Georgia', 'Times New Roman', serif"
    font-size="220"
    font-weight="300"
    fill="#CC1A1A"
